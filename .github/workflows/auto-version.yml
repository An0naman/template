name: Auto Version Bump

on:
  workflow_dispatch:
    inputs:
      bump_type:
        description: 'Version bump type'
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write

concurrency:
  group: auto-version-main
  cancel-in-progress: false

jobs:
  bump-version:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config --global user.name 'GitHub Actions'
          git config --global user.email 'actions@github.com'

      - name: Compute Next Version
        id: next_version
        run: |
          git fetch --tags --force

          LAST_TAG=$(git tag -l 'v*.*.*' --sort=-v:refname | head -n 1)
          if [ -z "$LAST_TAG" ]; then
            BASE_VERSION="1.0.0"
          else
            BASE_VERSION="${LAST_TAG#v}"
          fi

          IFS='.' read -r MAJOR MINOR PATCH <<< "$BASE_VERSION"

          BUMP_TYPE="${{ github.event.inputs.bump_type || 'patch' }}"
          case "$BUMP_TYPE" in
            major)
              MAJOR=$((MAJOR + 1))
              MINOR=0
              PATCH=0
              ;;
            minor)
              MINOR=$((MINOR + 1))
              PATCH=0
              ;;
            *)
              PATCH=$((PATCH + 1))
              ;;
          esac

          NEXT_VERSION="${MAJOR}.${MINOR}.${PATCH}"
          echo "next_version=$NEXT_VERSION" >> "$GITHUB_OUTPUT"
          echo "base_version=$BASE_VERSION" >> "$GITHUB_OUTPUT"

      - name: Push Version Tag
        run: |
          VERSION="${{ steps.next_version.outputs.next_version }}"
          git tag "v$VERSION"
          git push origin "v$VERSION"

      - name: Summary
        run: |
          echo "Created tag v${{ steps.next_version.outputs.next_version }} (from ${{ steps.next_version.outputs.base_version }})" >> "$GITHUB_STEP_SUMMARY"
